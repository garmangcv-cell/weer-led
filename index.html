<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weer Wemmel - Fullscreen</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    iframe {
      border: none;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <iframe 
    src="about:blank"
    id="weatherFrame"
    allow="fullscreen"
    sandbox="allow-scripts allow-same-origin">
  </iframe>

  <script>
    var iframe = document.getElementById('weatherFrame');
    iframe.srcdoc = `
      <html>
      <body style="margin:0; padding:0; overflow:hidden;">
        <a class="weatherwidget-io" 
           href="https://forecast7.com/en/50.91n4.31/wemmel/" 
           data-label_1="WEMMEL" 
           data-label_2="WEER" 
           data-theme="original" 
           data-days="5" 
           data-lang="nl">
          WEMMEL WEER
        </a>
        <script>
        !function(d,s,id){
          var js,fjs=d.getElementsByTagName(s)[0];
          if (!d.getElementById(id)) {
            js=d.createElement(s);
            js.id=id;
            js.src='https://weatherwidget.io/js/widget.min.js';
            fjs.parentNode.insertBefore(js,fjs);
          }
        }(document, 'script', 'weatherwidget-io-js');
        </script>
      </body>
      </html>`;
  </script>
</body>
</html>

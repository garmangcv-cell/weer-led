<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Weer Wemmel</title>
<style>
html, body {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-family:Arial;
  color:white;
  background:#222;
}
#temp {
  font-size:300px;
  font-weight:bold;
}
#desc {
  font-size:120px;
}
img {
  width:300px;
}
</style>
</head>
<body>

<div id="temp">Laden...</div>
<img id="icon">
<div id="desc"></div>

<script>
const apiKey = "4be71eb03c7f13bee04d7f5db637ba7e";
const city = "Wemmel,BE";

fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&lang=nl&appid=${apiKey}`)
.then(res => res.json())
.then(data => {
  document.getElementById("temp").innerHTML = Math.round(data.main.temp) + "°C";
  document.getElementById("desc").innerHTML = data.weather[0].description;
  document.getElementById("icon").src = "https://openweathermap.org/img/wn/" + data.weather[0].icon + "@4x.png";
})
.catch(err => {
  document.getElementById("temp").innerHTML = "Fout bij laden";
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Weer Wemmel</title>
<style>
  html, body {
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    font-family: Arial, sans-serif;
    color: #ffffff;
    display:flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: background 1s ease;
    overflow: hidden;
  }

  #city {
    font-size: 200px;
    font-weight: bold;
    margin-bottom: 30px;
  }

  #temp {
    font-size: 700px;
    font-weight: bold;
    margin-bottom: 20px;
  }

  #icon {
    width: 400px;
    height: 400px;
    margin-bottom: 20px;
  }

  #desc {
    font-size: 200px;
    text-transform: capitalize;
    margin-bottom: 30px;
  }

  #update {
    font-size: 100px;
    color: #cccccc;
  }
</style>
</head>
<body>
<div id="city">Wemmel, BE</div>
<div id="temp">--°C</div>
<img id="icon" src="" alt="Weer icoon">
<div id="desc">Laden...</div>
<div id="update"></div>

<script>
const apiKey = "4be71eb03c7f13bee04d7f5db637ba7e"; 
const city = "Wemmel,BE";

function getIconUrl(icon) {
  return `https://openweathermap.org/img/wn/${icon}@4x.png`;
}

function setBackground(weatherMain) {
  switch(weatherMain.toLowerCase()) {
    case "clear": document.body.style.background = "linear-gradient(to top, #66ccff, #0099ff)"; break;
    case "clouds": document.body.style.background = "linear-gradient(to top, #999999, #666666)"; break;
    case "rain":
    case "drizzle": document.body.style.background = "linear-gradient(to top, #4d4d4d, #1a1a1a)"; break;
    case "thunderstorm": document.body.style.background = "linear-gradient(to top, #333333, #000000)"; break;
    case "snow": document.body.style.background = "linear-gradient(to top, #ffffff, #a6c0ff)"; document.body.style.color="#000"; break;
    default: document.body.style.background = "linear-gradient(to top, #004080, #66ccff)"; document.body.style.color="#fff"; break;
  }
}

async function fetchWeather() {
  try {
    const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&lang=nl&appid=${apiKey}`);
    const data = await response.json();

    document.getElementById('temp').textContent = Math.round(data.main.temp) + "°C";
    document.getElementById('desc').textContent = data.weather[0].description;
    document.getElementById('icon').src = getIconUrl(data.weather[0].icon);
    document.getElementById('update').textContent = "Laatste update: " + new Date().toLocaleTimeString('nl-BE');

    setBackground(data.weather[0].main);
  } catch(err) {
    document.getElementById('temp').textContent = "Fout bij laden";
    document.getElementById('desc').textContent = "";
    document.getElementById('icon').src = "";
    document.body.style.background = "linear-gradient(to top, #004080, #66ccff)";
  }
}

// Eerste keer laden
fetchWeather();

// Auto-refresh elke 10 minuten
setInterval(fetchWeather, 600000);
</script>
</body>
</html>
